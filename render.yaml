databases:
  - name: marketing-planner-db
    plan: free
    databaseName: marketing_planner
    user: admin

services:
  - type: web
    name: marketing-planner-dashboard
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketing-planner-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
