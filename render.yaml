services:
  - type: web
    name: marketing-planner-dashboard
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CLOUD_STORAGE_PROVIDER
        value: azure
      - key: AZURE_STORAGE_CONNECTION_STRING
        sync: false
      - key: AZURE_BLOB_CONTAINER
        sync: false
      - key: AZURE_BLOB_FOLDER_PREFIX
        value: marketing-assets/
