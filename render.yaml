databases:
  - name: marketing-planner-db
    plan: free
    databaseName: marketing_planner
    user: admin

services:
  - type: web
    name: marketing-planner-dashboard
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketing-planner-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CLOUD_STORAGE_PROVIDER
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: AWS_REGION
        sync: false
      - key: S3_FOLDER_PREFIX
        value: marketing-assets/
      - key: AZURE_STORAGE_CONNECTION_STRING
        sync: false
      - key: AZURE_BLOB_CONTAINER
        sync: false
      - key: AZURE_BLOB_FOLDER_PREFIX
        value: marketing-assets/
